name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...

      - name: test next-version.sh fixtures
        run: bash scripts/test_next_version.sh
